    <script>
        const log = (msg, status) => {
            const div = document.createElement('div');
            div.textContent = msg;
            div.className = status;
            document.getElementById('results').appendChild(div);
        };

        const expectedBlocks = [
            "Estrategia",
            "Dignidad Humana",
            "Green IT / Eco",
            "Justicia / Prov",
            "Transparencia",
            "Clientes / Social",
            "Residuos / HW"
        ];

        // Test 1: Question Count
        if (quizQuestions.length === 43) {
            log(`[PASS] Total Questions: ${quizQuestions.length}`, 'pass');
        } else {
            log(`[FAIL] Total Questions: ${quizQuestions.length} (Expected 43)`, 'fail');
        }

        // Test 2: Block Mapping
        let blockCounts = {};
        let mappingError = false;

        quizQuestions.forEach((q, index) => {
            if (!expectedBlocks.includes(q.block)) {
                log(`[FAIL] Q${index + 1} (ID ${q.id}) has invalid block: "${q.block}"`, 'fail');
                mappingError = true;
            }
            blockCounts[q.block] = (blockCounts[q.block] || 0) + 1;
        });

        if (!mappingError) {
            log(`[PASS] All questions have valid blocks.`, 'pass');
        }

        // Test 3: Block Counts & Max Score
        let calculatedMaxScore = 0;
        console.log("Block Counts:", blockCounts);

        for (const [block, count] of Object.entries(blockCounts)) {
            const expectedScore = count * 10;
            calculatedMaxScore += expectedScore;
            log(`Block "${block}": ${count} questions -> ${expectedScore} pts`, 'pass');
        }

        if (calculatedMaxScore === 430) {
            log(`[PASS] Total Calculated Max Score: ${calculatedMaxScore}`, 'pass');
        } else {
            log(`[FAIL] Total Calculated Max Score: ${calculatedMaxScore} (Expected 430)`, 'fail');
